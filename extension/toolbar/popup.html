<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 290px; margin: 0; padding: 14px 16px; font: 13px/1.5 -apple-system, "Helvetica Neue", sans-serif; color: #1f1e1c; }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
    .sub { color: #8a8781; font-size: 12px; margin: 0 0 12px; }
    h2 { font-size: 12px; font-weight: 600; color: #6b6960; margin: 14px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
    label.row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
    select { font: inherit; }
    p.hint { color: #8a8781; font-size: 12px; margin: 8px 0 0; }
    .langs { font-size: 11px; color: #8a8781; line-height: 1.6; }
    #saved-list { max-height: 170px; overflow: auto; margin: 4px 0; padding: 0; list-style: none; }
    #saved-list li { display: flex; gap: 6px; align-items: baseline; padding: 3px 0; border-bottom: 1px solid #f0efe9; }
    #saved-list .w { font-size: 15px; } #saved-list .p { color: #3a6ea5; font-size: 12px; }
    #saved-list .d { color: #6b6960; font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #saved-list button { all: unset; cursor: pointer; color: #b0ada5; padding: 0 4px; }
    #saved-list button:hover { color: #a32d2d; }
    button.act { font: inherit; font-size: 12px; cursor: pointer; padding: 3px 10px; border: 1px solid #c9d8ea; border-radius: 6px; background: #fff; color: #3a6ea5; }
    button.act:hover { background: #e3edfb; }
    .empty { color: #8a8781; font-size: 12px; font-style: italic; }
    @media (prefers-color-scheme: dark) {
      body { background: #26251f; color: #ece9e2; }
      h2, .d, .sub, .langs { color: #b5b2a6; }
      #saved-list li { border-color: #3a3931; }
      button.act { background: #26251f; color: #8ab4e8; border-color: #3f5876; }
      .empty, p.hint { color: #a8a496; }
    }
  </style>
</head>
<body>
  <h1>Worldglass</h1>
  <p class="sub">Select text in any supported language — Worldglass detects it automatically.</p>
  <label class="row">Chinese readings
    <select id="reading">
      <option value="man">Mandarin (pinyin)</option>
      <option value="yue">Cantonese (Jyutping)</option>
      <option value="nan">Hokkien (Tâi-lô)</option>
      <option value="teo">Teochew (Peng'im)</option>
    </select>
  </label>
  <button class="act" id="ocr" style="margin-top:8px">Read text in an image (OCR)</button>
  <h2>Saved words</h2>
  <ul id="saved-list"></ul>
  <button class="act" id="export">Copy as CSV (Anki)</button>
  <h2>Languages</h2>
  <p class="langs">Chinese · Japanese · Korean · Arabic · Jawi · Hebrew · French · German · Spanish · Malay</p>
  <script src="popup.js"></script>
</body>
</html>
